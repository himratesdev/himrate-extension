name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # === Lint (ESLint + TypeScript) — on every PR ===
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  # === Tests (Vitest) — on every PR ===
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run test

  # === Build + Verify — on every PR ===
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - name: Verify dist — required files
        run: |
          REQUIRED_FILES="manifest.json popup.html sidepanel.html background.js content.js popup.js sidepanel.js"
          for f in $REQUIRED_FILES; do
            test -f "dist/$f" || (echo "FAIL: $f missing in dist/" && exit 1)
          done
          echo "All required files present in dist/ ✓"

      - name: Verify dist — manifest_version = 3
        run: |
          MV=$(node -e "console.log(require('./dist/manifest.json').manifest_version)")
          test "$MV" = "3" || (echo "FAIL: manifest_version is $MV, expected 3" && exit 1)
          echo "manifest_version: 3 ✓"

      - name: Verify dist — permissions whitelist
        run: |
          PERMS=$(node -e "console.log(JSON.stringify(require('./dist/manifest.json').permissions.sort()))")
          EXPECTED='["activeTab","alarms","identity","sidePanel","storage","webNavigation"]'
          test "$PERMS" = "$EXPECTED" || (echo "FAIL: permissions $PERMS != expected $EXPECTED" && exit 1)
          echo "Permissions match whitelist ✓"

      - name: Verify dist — bundle size < 1024KB
        run: |
          # Limit: 1024KB (1MB). Includes self-hosted @fontsource fonts (~200KB woff2).
          # Headroom for Phase 2 (API client, auth) and Phase 3 (charts, tab content).
          SIZE=$(du -sk dist/ | cut -f1)
          test "$SIZE" -lt 1024 || (echo "FAIL: dist/ is ${SIZE}KB, limit 1024KB (1MB)" && exit 1)
          echo "Bundle size: ${SIZE}KB ✓"

      - name: Verify dist — no hardcoded Russian outside locales
        run: |
          # Check for Cyrillic in JS files (should be only in locale JSON, not in built JS)
          CYRILLIC=$(grep -rl '[а-яА-ЯёЁ]' dist/*.js dist/chunks/*.js 2>/dev/null | wc -l)
          if [ "$CYRILLIC" -gt 0 ]; then
            echo "WARNING: Found Cyrillic text in JS bundles (expected — locale strings are bundled)"
          fi
          echo "Hardcoded strings check complete ✓"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: himrate-extension-${{ github.sha }}
          path: dist/
          retention-days: 30

  # === Security (npm audit) — on every PR ===
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=critical
